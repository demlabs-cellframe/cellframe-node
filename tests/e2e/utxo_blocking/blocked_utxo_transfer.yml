# Blocked UTXO Transfer E2E Test
# Full scenario: blocked UTXO cannot be spent

name: Blocked UTXO Cannot Be Spent
description: |
  End-to-end test verifying that blocked UTXO cannot be spent
  in regular transactions, while unblocked UTXO work normally.
  
  Complete workflow:
  1. Create token with UTXO blocking
  2. Create multiple UTXO
  3. Block specific UTXO
  4. Verify blocked UTXO cannot be spent
  5. Verify unblocked UTXO can be spent
author: QA Team
tags: [e2e, utxo-blocking, transfer, critical]

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/set_root_cert.yml

defaults:
  node: node1
  wait: 3s

setup:
  # Note: root_certs from common/set_root_cert.yml (both ROOT certs for auth_certs_number_verify=2)
  
  # Create two wallets for testing
  - cli: wallet new -w sender
  
  - cli: wallet info -w sender -net {{network_name}}
    save_wallet: sender_addr
  
  - cli: wallet new -w receiver
  
  - cli: wallet info -w receiver -net {{network_name}}
    save_wallet: receiver_addr
  
  # Create token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -token BLOCKTEST -total_supply 10000000 -decimals 18 -signs_total 2 -signs_emission 2 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash

  - cli: mempool proc -chain zerochain -datum {{token_hash}}
  
  # Emit tokens to sender on zerochain - needs ROOT certs
  - cli: token_emit -token BLOCKTEST -emission_value 10000000 -addr {{sender_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emission
  
  - cli: mempool proc -chain zerochain -datum {{emission}}
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s
  
  # Create TX from emission - this creates UTXO for sender wallet
  - cli: tx_create -token BLOCKTEST -from_emission {{emission}} -to_addr {{sender_addr}} -value 2000000 -fee 0.1 -cert {{root_cert_single}}
    save_hash: initial_tx
  
  - cli: mempool proc -chain main -datum {{initial_tx}}
  
  # Wait for UTXO to be indexed
  - wait: 10s
  
  # Block this specific UTXO on zerochain - needs ROOT certs
  - cli: token_update -token BLOCKTEST -utxo_blocked_add {{initial_tx}}:0 -certs {{root_certs}} -chain zerochain
    save_hash: block_tx

  - cli: mempool proc -chain zerochain -datum {{block_tx}}
  
  # Wait for blocklist update to sync
  - wait: 30s

test:
  # Note: CLI -from_wallet automatically skips blocked UTXOs
  # Since all sender's UTXOs are blocked, this should fail
  - cli: tx_create -token BLOCKTEST -from_wallet sender -to_addr {{receiver_addr}} -value 500000 -fee 0.1
    expect: error
  
  # Verify blocklist contains the UTXO
  - cli: token info -name BLOCKTEST -net {{network_name}}
    contains: "{{initial_tx}}"

check:
  # Verify blocked UTXO is still in blocklist
  - cli: token info -name BLOCKTEST -history_limit 10 -net {{network_name}}
    contains: "{{initial_tx}}"
  
  # Verify sender still has their tokens (blocked UTXO cannot be spent)
  - cli: wallet info -w sender -net {{network_name}}
    contains: "BLOCKTEST"

