name: UTXO Blocking Configuration Test
description: |
  Test verifying that token_update -utxo_blocked_add command
  correctly adds UTXO to blocked list.
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml

setup:
  - wait: 3s

  - cli: "wallet new -w utxo_block_wallet -sign_type sig_dil"
    expect: success

  - cli: "wallet info -w utxo_block_wallet -net {{network_name}}"
    expect: success
    save_wallet: wallet_addr

test:
  - group: Create and register token on zerochain
    steps:
      - config: "{{network_name}}/zerochain"
        nodes: ["{{first_root}}"]
        set:
          is_add_directly: "true"

      - docker_op: stop
        services: ["{{first_root}}"]

      - docker_op: start
        services: ["{{first_root}}"]

      - wait_network: online
        nodes: ["{{first_root}}"]
        timeout: 60

      - cli: "token_decl -net {{network_name}} -token BLOCKTEST -total_supply 10000000 -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert -chain zerochain"
        expect: success
        save_hash: token_hash

      - cli: "mempool proc_all -net {{network_name}} -chain zerochain"
        expect: success

      - wait: 30s

      - cli: "token info -net {{network_name}} -name BLOCKTEST"
        expect: success
        contains: "BLOCKTEST"

  - group: Emit tokens
    steps:
      - cli: "token_emit -net {{network_name}} -token BLOCKTEST -emission_value 2000000 -addr {{wallet_addr}} -certs test_cert -chain zerochain"
        expect: success
        save_hash: emission

      - cli: "mempool proc_all -net {{network_name}} -chain zerochain"
        expect: success

      - wait: 30s

  - group: Create UTXO from emission
    steps:
      - cli: "tx create -net {{network_name}} -chain_emission zerochain -token BLOCKTEST -from_emission {{emission}} -to_addr {{wallet_addr}} -value 2000000000000000000000000 -cert test_cert -chain main -fee 0"
        expect: success
        save_hash: utxo_tx

      - wait: 60s

      - config: "{{network_name}}/zerochain"
        nodes: ["{{first_root}}"]
        set:
          is_add_directly: "false"

  - group: Block specific UTXO
    steps:
      - cli: "token_update -net {{network_name}} -token BLOCKTEST -utxo_blocked_add {{utxo_tx}}:0 -certs test_cert -chain zerochain"
        expect: success
        save_hash: block_tx

      - cli: "mempool proc_all -net {{network_name}} -chain zerochain"
        expect: success

      - wait: 30s

  - group: Verify token and wallet state
    steps:
      - cli: "token info -net {{network_name}} -name BLOCKTEST"
        expect: success
        contains: "BLOCKTEST"

      - cli: "token info -net {{network_name}} -name BLOCKTEST"
        expect: success
        contains: "BLOCKTEST"
