# UTXO Blocking Configuration Test
# Verify token_update -utxo_blocked_add command works

name: UTXO Blocking Configuration Test
description: |
  Test verifying that token_update -utxo_blocked_add command
  correctly adds UTXO to blocked list.

author: QA Team
tags: [e2e, utxo-blocking, token-update]

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/set_root_cert.yml

defaults:
  node: node1
  wait: 1s

setup:
  - wait: 3s
  
  # Create wallet
  - cli: wallet new -w utxo_block_wallet
  
  - cli: wallet info -w utxo_block_wallet -net {{network_name}}
    save_wallet: wallet_addr

test:
  # Create token on zerochain (DAG-PoA)
  - cli: token_decl -net {{network_name}} -token BLOCKTEST -total_supply 10000000 -decimals 18 -signs_total 2 -signs_emission 2 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash

  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
  
  - wait: 30s
  
  # Emit tokens
  - cli: token_emit -net {{network_name}} -token BLOCKTEST -emission_value 2000000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emission
  
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{emission}}
  
  - wait: 30s
  
  # Create UTXO
  - cli: tx create -net {{network_name}} -chain_emission zerochain -token BLOCKTEST -from_emission {{emission}} -to_addr {{wallet_addr}} -value 2000000 -cert {{root_cert_single}} -chain main
    save_hash: utxo_tx
  
  - cli: mempool proc -net {{network_name}} -chain main -datum {{utxo_tx}}
  
  - wait: 30s
  
  # Block the specific UTXO using token_update command
  - cli: token_update -net {{network_name}} -token BLOCKTEST -utxo_blocked_add {{utxo_tx}}:0 -certs {{root_certs}} -chain zerochain
    save_hash: block_tx
    description: "Add UTXO to blocked list"

  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{block_tx}}
  
  - wait: 30s

check:
  # Verify token exists
  - cli: token info -net {{network_name}} -name BLOCKTEST
    contains: "BLOCKTEST"
    description: "Token BLOCKTEST should exist"
  
  # Verify wallet has tokens (UTXO was created before blocking)
  - cli: wallet info -w utxo_block_wallet -net {{network_name}}
    contains: "BLOCKTEST"
    description: "Wallet should have BLOCKTEST tokens"
