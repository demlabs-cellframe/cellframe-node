name: Voting service lifecycle
description: |
  End-to-end test for the voting service:
  create vote → cast votes → verify result
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml
  - common/create_wallet.yml

variables:
  vote_question: "Test proposal for E2E voting"
  option_a: "Approve"
  option_b: "Reject"

test:
  - group: Fund test wallet with native token for fees
    steps:
      - cli: "tx_create -net {{network_name}} -chain main -token {{native_ticker}} -value 1000000000000000000000 -from_wallet {{network_name}}_root_0 -to_addr {{wallet_addr}} -fee 10000000000000000000"
        expect: success

      - wait: 120s

      - cli: "wallet info -w test_wallet -net {{network_name}}"
        expect: success
        contains: "{{native_ticker}}"

  - group: Create voting
    steps:
      - cli: 'poll create -net {{network_name}} -question "{{vote_question}}" -options "{{option_a}}", "{{option_b}}" -max_votes_count 10 -w test_wallet -fee 10000000000000000000'
        expect: success
        save_hash: voting_hash

      - wait: 60s

  - group: Cast vote from first node
    steps:
      - cli: "poll vote -net {{network_name}} -hash {{voting_hash}} -option_idx 0 -w test_wallet -fee 10000000000000000000"
        expect: success

      - wait: 60s

  - group: Verify voting results
    steps:
      - cli: "poll list -net {{network_name}}"
        expect: success
        contains: "{{vote_question}}"

      - cli: "poll dump -net {{network_name}} -hash {{voting_hash}}"
        expect: success
        contains: "{{option_a}}"
