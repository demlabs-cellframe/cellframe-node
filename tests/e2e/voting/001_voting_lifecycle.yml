name: Voting service lifecycle
description: |
  End-to-end test for the voting service:
  verify root wallet TCELL balance → declare voting token →
  create vote → verify in mempool
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml

variables:
  vote_question: "Test proposal for E2E voting"
  option_a: "Approve"
  option_b: "Reject"
  vote_token: EVOTE01

test:
  - group: Verify root wallet has native tokens
    steps:
      - cli: "wallet info -w {{network_name}}_root_0 -net {{network_name}}"
        expect: success
        contains: "TCELL"

  - group: Declare voting token
    steps:
      - cli: "token_decl -token {{vote_token}} -total_supply 1000000 -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert"
        expect: success
        save_hash: token_hash

      - wait_for_datum: "{{token_hash}}"
        chain: zerochain
        timeout_total: 120
        timeout_mempool: 60
        timeout_in_blocks: 120

      - cli: "token info -net {{network_name}} -name {{vote_token}}"
        expect: success
        contains: "{{vote_token}}"

  - group: Create voting
    steps:
      - cli: 'voting create -question "{{vote_question}}" -options "{{option_a}},{{option_b}}" -max_votes_count 10 -token {{vote_token}} -w {{network_name}}_root_0 -fee 0.05'
        expect: success
        save_hash: voting_hash

  - group: Verify voting in mempool
    steps:
      - cli: "mempool list -chain main"
        expect: success
        contains: "{{voting_hash}}"

      - cli: "voting list -net {{network_name}}"
        expect: success
