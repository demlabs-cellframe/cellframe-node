name: Voting service lifecycle
description: |
  End-to-end test for the voting service:
  create vote → cast votes → verify result
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml
  - common/create_wallet.yml

variables:
  vote_question: "Test proposal for E2E voting"
  option_a: "Approve"
  option_b: "Reject"

test:
  - group: Wait for ledger to rebuild from chain data
    steps:
      - wait: cli
        cmd: "wallet info -w {{network_name}}_root_0 -net {{network_name}}"
        contains: "{{native_ticker}}"
        timeout: 120
        interval: 5

  - group: Fund test wallet with native token for fees
    steps:
      - cli: "tx create -net {{network_name}} -chain main -token {{native_ticker}} -value 1000000000000000000000 -from_wallet {{network_name}}_root_0 -to_addr {{wallet_addr}} -fee 10000000000000000000"
        expect: success
        save_hash: fund_wallet_hash

      - cli: "mempool proc_all -net {{network_name}} -chain main"
        expect: success

      - wait_for_datum: "{{fund_wallet_hash}}"
        chain: main
        timeout_total: 420
        timeout_mempool: 360
        timeout_verification: 360
        timeout_in_blocks: 360

      - wait: 10s

      - cli: "wallet info -w test_wallet -net {{network_name}}"
        expect: success
        contains: "{{native_ticker}}"

  - group: Create voting
    steps:
      - cli: 'poll create -net {{network_name}} -question "{{vote_question}}" -options "{{option_a}},{{option_b}}" -max_votes_count 10 -w test_wallet -fee 10000000000000000000'
        expect: success
        save_hash: voting_hash

      - cli: "mempool proc_all -net {{network_name}} -chain main"
        expect: success

      - wait_for_datum: "{{voting_hash}}"
        chain: main
        timeout_total: 420
        timeout_mempool: 360
        timeout_verification: 360
        timeout_in_blocks: 360

      - wait: 10s

  - group: Cast vote from first node
    steps:
      - wait: cli
        cmd: "wallet info -w test_wallet -net {{network_name}}"
        contains: "{{native_ticker}}"
        timeout: 120
        interval: 5

      - cli: "poll vote -net {{network_name}} -hash {{voting_hash}} -option_idx 0 -w test_wallet -fee 10000000000000000000"
        expect: success

      - cli: "mempool proc_all -net {{network_name}} -chain main"
        expect: success

      - wait: cli
        cmd: "poll dump -net {{network_name}} -hash {{voting_hash}}"
        contains: "{{option_a}}"
        timeout: 300
        interval: 10

  - group: Verify voting results
    steps:
      - cli: "poll list -net {{network_name}}"
        expect: success
        contains: "{{voting_hash}}"

      - cli: "poll dump -net {{network_name}} -hash {{voting_hash}}"
        expect: success
        contains: "{{option_a}}"
