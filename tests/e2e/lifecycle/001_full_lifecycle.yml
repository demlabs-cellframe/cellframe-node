name: Full blockchain lifecycle
description: |
  End-to-end test covering the complete lifecycle:
  network online → wallet creation → fund wallet from root →
  transfer between wallets → ledger state verification
version: "1.0"

includes:
  - common/defaults.yml

test:
  - group: Verify network is operational
    steps:
      - cli: "net get status"
        expect: success
        contains: "NET_STATE_ONLINE"

      - cli: "net get links"
        expect: success

  - group: Create wallets
    steps:
      - cli: "wallet new -w e2e_alice -sign_type sig_dil"
        expect: success

      - cli: "wallet info -w e2e_alice -net {{network_name}}"
        expect: success
        save_wallet: alice_addr

      - cli: "wallet new -w e2e_bob -sign_type sig_dil"
        expect: success

      - cli: "wallet info -w e2e_bob -net {{network_name}}"
        expect: success
        save_wallet: bob_addr

  - group: Fund Alice from root wallet
    steps:
      - cli: "tx_create -net {{network_name}} -chain main -token {{native_ticker}} -value 1000000000000000000000 -from_wallet {{network_name}}_root_0 -to_addr {{alice_addr}} -fee 10000000000000000000"
        expect: success
        save_hash: fund_alice_hash

      - wait_for_datum: "{{fund_alice_hash}}"
        chain: main
        timeout_total: 420
        timeout_mempool: 360
        timeout_verification: 360
        timeout_in_blocks: 360

      - wait: 10s

      - cli: "wallet info -w e2e_alice -net {{network_name}}"
        expect: success
        contains: "{{native_ticker}}"

  - group: Transfer from Alice to Bob
    steps:
      - cli: "tx_create -net {{network_name}} -chain main -token {{native_ticker}} -value 100000000000000000000 -from_wallet e2e_alice -to_addr {{bob_addr}} -fee 10000000000000000000"
        expect: success
        save_hash: transfer_bob_hash

      - wait_for_datum: "{{transfer_bob_hash}}"
        chain: main
        timeout_total: 420
        timeout_mempool: 360
        timeout_verification: 360
        timeout_in_blocks: 360

      - wait: 10s

  - group: Verify final ledger state
    steps:
      - cli: "wallet info -w e2e_bob -net {{network_name}}"
        expect: success
        contains: "{{native_ticker}}"

      - cli: "wallet info -w e2e_alice -net {{network_name}}"
        expect: success
        contains: "{{native_ticker}}"
