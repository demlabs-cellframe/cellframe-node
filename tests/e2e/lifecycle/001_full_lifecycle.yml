name: Full blockchain lifecycle
description: |
  End-to-end test covering the complete lifecycle:
  network online → token declaration → emission →
  base TX from emission → mempool verification
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml

variables:
  token_name: E2ELIFE
  total_supply: "1000000"
  emission_value: "50000"
  transfer_value: "1000"

test:
  - group: Verify network is operational
    steps:
      - cli: "net get status -net {{network_name}}"
        expect: success
        contains: "NET_STATE_ONLINE"

      - cli: "net get links -net {{network_name}}"
        expect: success

  - group: Create wallets
    steps:
      - cli: "wallet new -w e2e_alice -sign_type sig_dil"
        expect: success

      - wait: 2s

      - cli: "wallet info -w e2e_alice -net {{network_name}}"
        expect: success
        save_wallet: alice_addr

      - cli: "wallet new -w e2e_bob -sign_type sig_dil"
        expect: success

      - wait: 2s

      - cli: "wallet info -w e2e_bob -net {{network_name}}"
        expect: success
        save_wallet: bob_addr

  - group: Declare token
    steps:
      - cli: "token_decl -token {{token_name}} -total_supply {{total_supply}} -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert"
        expect: success
        save_hash: token_hash

      - wait_for_datum: "{{token_hash}}"
        chain: zerochain
        timeout_total: 120
        timeout_mempool: 60
        timeout_in_blocks: 120

      - cli: "token info -net {{network_name}} -name {{token_name}}"
        expect: success
        contains: "{{token_name}}"

  - group: Emit tokens to Alice
    steps:
      - cli: "token_emit -token {{token_name}} -emission_value {{emission_value}} -addr {{alice_addr}} -certs test_cert"
        expect: success
        save_hash: emit_hash

      - wait_for_datum: "{{emit_hash}}"
        chain: zerochain
        timeout_total: 120
        timeout_mempool: 60
        timeout_in_blocks: 120

      - wait: 5s

  - group: Create base transaction from emission
    steps:
      - cli: "tx_create -token {{token_name}} -chain main -from_emission {{emit_hash}} -chain_emission zerochain -to_addr {{bob_addr}} -value {{transfer_value}} -fee 1 -cert test_cert"
        expect: success
        save_hash: tx_hash

  - group: Verify final state
    steps:
      - cli: "mempool list -chain main"
        expect: success
        contains: "{{tx_hash}}"

      - cli: "token info -net {{network_name}} -name {{token_name}}"
        expect: success
        contains: "{{token_name}}"
