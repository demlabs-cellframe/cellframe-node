# Arbitrage Bypass Test
# Verifies that arbitrage transactions can bypass blocked UTXO
name: Arbitrage Bypass Test
description: Arbitrage transactions should bypass UTXO blocklist
author: QA Team
tags: [arbitrage, utxo-blocking, critical]

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

# Global defaults for all sections
defaults:
  node: node1
  wait: 3s

# Setup phase: create token with UTXO blocking enabled
setup:
  # Note: root_certs from common/set_root_cert.yml (both ROOT certs for auth_certs_number_verify=2)
  
  # Create ARBTEST token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -decimals 18 -signs_total 2 -signs_emission 2 -token ARBTEST -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  - cli: mempool proc -chain zerochain -datum {{token_hash}}
  
  # Emit ARBTEST tokens 1 on zerochain - needs ROOT certs
  - cli: token_emit -token ARBTEST -emission_value 500 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emission_tx_1
  - cli: mempool proc -chain zerochain -datum {{emission_tx_1}}

  # Emit ARBTEST tokens 2 on zerochain - needs ROOT certs
  - cli: token_emit -token ARBTEST -emission_value 1000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emission_tx_2
  - cli: mempool proc -chain zerochain -datum {{emission_tx_2}}

  # Emit ARBTEST tokens 3 on zerochain - needs ROOT certs
  - cli: token_emit -token ARBTEST -emission_value 1500 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emission_tx_3
  - cli: mempool proc -chain zerochain -datum {{emission_tx_3}}
  
  # Wait for DAG consensus and ledger sync for all emissions
  - wait: 30s
  
  # Create transaction 1 from emission (tx goes to main chain)
  - cli: tx_create -token ARBTEST -from_emission {{emission_tx_1}} -to_addr {{wallet_addr}} -value 500 -fee 0.1 -cert {{root_cert_single}}
    save_hash: tx_hash_1
  - cli: mempool proc -chain main -datum {{tx_hash_1}}

  # Create transaction 2 from emission (tx goes to main chain)
  - cli: tx_create -token ARBTEST -from_emission {{emission_tx_2}} -to_addr {{wallet_addr}} -value 1000 -fee 0.1 -cert {{root_cert_single}}
    save_hash: tx_hash_2
  - cli: mempool proc -chain main -datum {{tx_hash_2}}

  # Create transaction 3 from emission (tx goes to main chain)
  - cli: tx_create -token ARBTEST -from_emission {{emission_tx_3}} -to_addr {{wallet_addr}} -value 1500 -fee 0.1 -cert {{root_cert_single}}
    save_hash: tx_hash_3
  - cli: mempool proc -chain main -datum {{tx_hash_3}}
  
  # Wait for UTXOs to be indexed
  - wait: 10s
  
  # Block the UTXO 1 and 2 but not 3 (token_update goes to zerochain) - needs ROOT certs
  - cli: token_update -token ARBTEST -utxo_blocked_add {{tx_hash_1}}:0 -certs {{root_certs}} -chain zerochain
    save_hash: token_update_1
  - cli: mempool proc -chain zerochain -datum {{token_update_1}}
  - cli: token_update -token ARBTEST -utxo_blocked_add {{tx_hash_2}}:0 -certs {{root_certs}} -chain zerochain
    save_hash: token_update_2
  - cli: mempool proc -chain zerochain -datum {{token_update_2}}
  
  # Wait for blocklist updates to sync
  - wait: 30s

# Test phase: verify blocking and arbitrage bypass
test:
  # Note: CLI uses -from_wallet which automatically handles UTXO selection
  # Blocked UTXOs should be skipped for regular transactions
  # But arbitrage flag should allow spending blocked UTXOs
  
  # Arbitrage transaction from wallet should succeed (bypasses blocking)
  - cli: tx_create -token ARBTEST -from_wallet {{wallet_name}} -value 100 -fee 0.1 -certs {{root_certs}} -arbitrage
    save_hash: arb_tx

  - cli: mempool proc -chain main -datum {{arb_tx}}

# Check phase: verify results
check:
  # Verify arbitrage tx in history
  - cli: tx_history -tx {{arb_tx}} -net {{network_name}}
    contains: "{{arb_tx}}"
  
  # Verify UTXOs still in blocklist (they were blocked in setup)
  - cli: token info -name ARBTEST -history_limit 10 -net {{network_name}}
    contains: "{{tx_hash_1}}"


