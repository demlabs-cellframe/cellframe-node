name: Network Go Online Test
description: Test network offline/online transitions
version: "1.0"

includes:
  - common/defaults.yml

test:
  - group: Verify network starts ONLINE
    steps:
      - cli: "net get status"
        expect: success
        contains: "NET_STATE_ONLINE"

  - group: Take network offline
    steps:
      - cli: "net go offline"
        expect: success

      - wait: 3s

      - cli: "net get status"
        expect: success
        contains: "NET_STATE_OFFLINE"

  - group: Bring network back online
    steps:
      - cli: "net go online"
        expect: success

      - wait: 10s

      - cli: "net get status"
        expect: success
        contains: "NET_STATE_ONLINE"
