name: Network Status Test
description: Verify network status reporting and network ID
version: "1.0"

includes:
  - common/defaults.yml

test:
  - group: Verify network is online
    steps:
      - cli: "net get status"
        expect: success
        contains: "NET_STATE_ONLINE"

  - group: Verify network has ID
    steps:
      - cli: "net get status"
        expect: success
        contains: "id:"

  - group: Verify native ticker in status
    steps:
      - cli: "net get status"
        expect: success
        contains: "native_ticker"

  - group: Verify on second node
    steps:
      - cli: "net get status"
        node: "node-2"
        expect: success
        contains: "NET_STATE_ONLINE"
