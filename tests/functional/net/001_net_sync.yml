name: Network Sync Test
description: Verify network synchronization state on multiple nodes
version: "1.0"

includes:
  - common/defaults.yml

test:
  - group: Verify sync state on root node
    steps:
      - cli: "net get status"
        expect: success
        contains: "NET_STATE_ONLINE"

  - group: Verify sync state on master node
    steps:
      - cli: "net get status"
        node: "{{first_master}}"
        expect: success
        contains: "NET_STATE_ONLINE"
