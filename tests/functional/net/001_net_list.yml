# Test: Network List
# Verify network enumeration

name: Network List Test
description: Test listing available networks
tags: [e2e, network, list, fast]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml

setup:
  - wait: 3s

test:
  # Test: Get network status (more reliable than net list with -net added)
  - cli: net -net {{network_name}} get status
    node: node1
    expect: success
    save: net_status
    description: "Get network status"

check:
  # Verify network is responding
  - python: |
      net_status = ctx.get_variable('net_status')
      # net get status returns network state info
      assert net_status is not None and len(net_status) > 0, \
        "Network should return status info"
    description: "Network is available and responding"

