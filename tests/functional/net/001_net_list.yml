# Test: Network List
# Verify network enumeration

name: Network List Test
description: Test listing available networks
tags: [e2e, network, list, fast]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml

setup:
  - wait: 3s

test:
  # Test: List all networks
  - cli: net list
    node: node1
    expect: success
    save: net_list
    description: "List all networks"

check:
  # Verify stagenet is in list (CLI may return YAML/text; accept stagenet, stage_net, stage-net)
  - python: |
      net_list = ctx.get_variable('net_list')
      net_lower = net_list.lower() if net_list else ''
      assert any(s in net_lower for s in ('stagenet', 'stage_net', 'stage-net')), \
        "Stagenet should be in network list (got: %s)" % (net_list[:200] if net_list else '')
    description: "Stagenet is available"

