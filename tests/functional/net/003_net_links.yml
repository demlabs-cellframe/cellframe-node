name: Network Links Test
description: Verify network links are established between nodes
version: "1.0"

includes:
  - common/defaults.yml

test:
  - group: Verify root node has active links
    steps:
      - cli: "net get status"
        expect: success
        contains: "active:"

  - group: Verify master node has active links
    steps:
      - cli: "net get status"
        node: "{{first_master}}"
        expect: success
        contains: "active:"
