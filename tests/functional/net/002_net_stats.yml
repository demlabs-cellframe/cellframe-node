name: Network Stats Test
description: Verify network transaction statistics return structured data
version: "1.0"

includes:
  - common/defaults.yml

test:
  - group: Get transaction stats
    steps:
      - cli: "net stats tx"
        expect: success
        contains: "transaction_statistics"

  - group: Verify status contains link counts
    steps:
      - cli: "net get status"
        expect: success
        contains: "active:"
