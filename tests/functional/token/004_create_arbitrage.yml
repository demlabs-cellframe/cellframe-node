# tx create -arbitrage Command Test
# Test creating transaction with arbitrage flag using -from_emission (no fees needed)

name: tx create -arbitrage Command
description: Test creating transaction using -arbitrage flag for cross-chain operations
tags: [functional, token, arbitrage, fast]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/set_root_cert.yml
  - common/version_compat.yml

defaults:
  node: node1
  wait: 3s

setup:
  # Create arbitrage wallet
  - cli: wallet new -w arb_wallet
  - cli: wallet info -w arb_wallet -net {{network_name}}
    save_wallet: arb_addr
  
  # Create token for arbitrage testing
  - cli: token_decl -net {{network_name}} -decimals 18 -signs_total 2 -signs_emission 2 -token ARBCMD -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
  
  - wait: 30s
  
  # Emit tokens for arbitrage
  - cli: token_emit -net {{network_name}} -token ARBCMD -emission_value 10000 -addr {{arb_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emission_tx
  
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{emission_tx}}
  
  - wait: 30s

test:
  # Test: Create transaction with -arbitrage flag using -from_emission
  # The -arbitrage flag allows creating transactions for cross-chain arbitrage
  - cli: "{{tx_create_cmd}} -net {{network_name}} -chain_emission zerochain -token ARBCMD -from_emission {{emission_tx}} -to_addr {{arb_addr}} -value 10000 -cert {{root_cert_single}} -chain main -arbitrage"
    save_hash: arb_tx
    description: "Create arbitrage transaction from emission"
  
  - cli: mempool proc -net {{network_name}} -chain main -datum {{arb_tx}}
  
  - wait: 30s

check:
  # Verify arbitrage transaction was processed
  - cli: wallet info -w arb_wallet -net {{network_name}}
    contains: "ARBCMD"
    description: "Arbitrage wallet should have ARBCMD tokens"
