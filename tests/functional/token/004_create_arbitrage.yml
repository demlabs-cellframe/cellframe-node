# tx_create -arbitrage Command Test
# Test creating token that supports arbitrage

name: tx_create -arbitrage Command
description: Test creating token with arbitrage support
tags: [functional, token, arbitrage, fast]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

defaults:
  node: node1
  wait: 3s

setup:
  # Create receiver wallet for arbitrage
  - cli: wallet new -w arb_receiver
  - cli: wallet info -w arb_receiver -net {{network_name}}
    save_wallet: receiver_addr
  
  # Create token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -net {{network_name}} -decimals 18 -signs_total 2 -signs_emission 2 -token ARBCMD -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  # Process token datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s
  
  # Emit tokens on zerochain - needs ROOT certs
  - cli: token_emit -net {{network_name}} -token ARBCMD -emission_value 10000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emission_tx
  
  # Process emission datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{emission_tx}}
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s

test:
  # Verify token was created
  - cli: token info -net {{network_name}} -name ARBCMD
    contains: "ARBCMD"
    description: "Token ARBCMD should exist"

check:
  # Verify token exists using token info
  - cli: token info -net {{network_name}} -name ARBCMD
    contains: "ARBCMD"
    description: "Token ARBCMD should exist in ledger"
