# token_update -utxo_blocked_add Command Test
# Test that token_update command creates update datum and applies it to ledger

name: token_update -utxo_blocked_add Command
description: Test adding UTXO hash to token blocklist via token_update command
tags: [functional, utxo-blocking, token_update, fast]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

# Global defaults for all sections
defaults:
  node: node1
  wait: 3s

setup:
  # Create token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -net {{network_name}} -decimals 18 -signs_total 2 -signs_emission 2 -token UPDTEST -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  # Process token datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s
  
  # Verify token was created
  - cli: token info -name UPDTEST -net {{network_name}}
    contains: "UPDTEST"

test:
  # Test: Create token_update to add a hash to blocklist
  # We use token_hash as a placeholder UTXO hash - the command should accept any valid hash format
  # The important thing is that token_update datum is created and processed
  - cli: token_update -net {{network_name}} -token UPDTEST -utxo_blocked_add {{token_hash}}:0 -certs {{root_certs}} -chain zerochain
    save_hash: update_hash
    contains: "Datum"
  
  # Process token update datum on zerochain
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{update_hash}}
    contains: "processed"
  
  # Wait for update to sync to ledger
  - wait: 30s

check:
  # Verify token still exists after update
  - cli: token info -name UPDTEST -net {{network_name}}
    contains: "UPDTEST"
  
  # Verify there is an update section in token info
  # The update datum should appear in the "updates" section
  - cli: token info -name UPDTEST -net {{network_name}}
    contains: "updates"
  
  # Verify the update datum hash appears in token info
  - cli: token info -name UPDTEST -net {{network_name}}
    contains: "{{update_hash}}"
