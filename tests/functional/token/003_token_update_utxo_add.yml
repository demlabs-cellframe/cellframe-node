# token_update -utxo_blocked_add Command Test
# Test that token_update command can block specific UTXOs

name: token_update -utxo_blocked_add Command
description: Test adding UTXO hash to token blocklist via token_update command
tags: [functional, utxo-blocking, token_update, fast]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

defaults:
  node: node1
  wait: 3s

setup:
  # Create token for UTXO blocking test
  - cli: token_decl -net {{network_name}} -decimals 18 -signs_total 2 -signs_emission 2 -token UTXOBLK -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
  
  - wait: 30s
  
  # Verify token was created
  - cli: token info -net {{network_name}} -name UTXOBLK
    contains: "UTXOBLK"

test:
  # Test: Use token_update to add UTXO to blocklist
  # Using token_hash:0 as a placeholder UTXO identifier
  - cli: token_update -net {{network_name}} -token UTXOBLK -utxo_blocked_add {{token_hash}}:0 -certs {{root_certs}} -chain zerochain
    save_hash: update_hash
    description: "Add UTXO to token blocklist"
  
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{update_hash}}
    description: "Process UTXO blocklist update"
  
  - wait: 30s

check:
  # Verify token still exists after update
  - cli: token info -net {{network_name}} -name UTXOBLK
    contains: "UTXOBLK"
    description: "Token UTXOBLK should exist after blocklist update"
