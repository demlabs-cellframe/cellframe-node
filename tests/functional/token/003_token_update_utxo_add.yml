# token_update -utxo_blocked_add Command Test
# Функциональный тест команды добавления UTXO в blocklist

name: token_update -utxo_blocked_add Command
description: Test adding UTXO to token blocklist
tags: [functional, utxo-blocking, token_update, fast]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

# Global defaults for all sections
defaults:
  node: node1
  wait: 3s

setup:
  # Create receiver wallet
  - cli: wallet new -w add_receiver
  - cli: wallet info -w add_receiver -net {{network_name}}
    save_wallet: receiver_addr
  
  # Create token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -decimals 18 -signs_total 2 -signs_emission 2 -token ADDTEST -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  # Process token datum (auto_confirmation may not work in test env)
  - cli: mempool proc -chain zerochain -datum {{token_hash}}
  
  # Wait for DAG consensus and ledger sync (events go through threshold first)
  - wait: 30s
  
  # Emit on zerochain - needs ROOT certs
  - cli: token_emit -token ADDTEST -emission_value 1000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emission
  
  # Process emission datum
  - cli: mempool proc -chain zerochain -datum {{emission}}
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s
  
  # Convert emission to UTXO
  - cli: tx_create -token ADDTEST -from_emission {{emission}} -to_addr {{wallet_addr}} -value 1000 -cert {{root_cert_single}} -chain main
    save_hash: base_tx_hash
  
  # Process base transaction
  - cli: mempool proc -chain main -datum {{base_tx_hash}}
  
  # Wait for UTXO to appear in wallet
  - wait: 30s
  
  # Create emission directly to receiver (avoids need for TCELL fee)
  - cli: token_emit -token ADDTEST -emission_value 500 -addr {{receiver_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: receiver_emission
  
  # Process receiver emission
  - cli: mempool proc -chain zerochain -datum {{receiver_emission}}
  
  # Wait for emission to sync
  - wait: 30s
  
  # Convert receiver emission to UTXO (this will be the UTXO we block)
  # tx_create -from_emission does NOT require fee!
  - cli: tx_create -token ADDTEST -from_emission {{receiver_emission}} -to_addr {{receiver_addr}} -value 500 -cert {{root_cert_single}} -chain main
    save_hash: utxo
  
  # Process UTXO transaction
  - cli: mempool proc -chain main -datum {{utxo}}
  
  # Wait for UTXO to be processed
  - wait: 30s

test:
  # Test: Add UTXO to blocklist (on zerochain) - needs ROOT certs
  - cli: token_update -token ADDTEST -utxo_blocked_add {{utxo}}:0 -certs {{root_certs}} -chain zerochain
    save_hash: update_hash
  
  # Process token update datum
  - cli: mempool proc -chain zerochain -datum {{update_hash}}
  
  # Wait for update to sync
  - wait: 30s

check:
  # Verify token exists
  # Note: -net is explicitly added because check phase may not inherit CLI defaults
  - cli: token info -name ADDTEST -net {{network_name}}
    contains: "ADDTEST"
  
  # Verify the token update was applied (shows in updates section)
  # Note: token info shows update datum hash, not the blocked UTXO hash directly
  - cli: token info -name ADDTEST -net {{network_name}}
    contains: "{{update_hash}}"

