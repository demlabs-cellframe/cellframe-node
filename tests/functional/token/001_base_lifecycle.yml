# Test: Full Token Lifecycle
# Complete token lifecycle from creation to transfer

name: Full Token Lifecycle Test
description: Test complete token lifecycle - create, emit, transfer, check
tags: [e2e, integration, token, critical]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml

defaults:
  node: node1

setup:
  - wait: 1s
  
  # Create two wallets
  - cli: wallet new -w lifecycle_wallet1
  - cli: wallet new -w lifecycle_wallet2
  
  # Get addresses with built-in validation
  - cli: wallet info -w lifecycle_wallet1
    wait: 1s
    save_wallet: wallet1_addr
  
  - cli: wallet info -w lifecycle_wallet2
    wait: 1s
    save_wallet: wallet2_addr

test:
  # Step 1: Create token and wait for it to be accepted
  - cli: token_decl -token LIFECYCLE -total_supply 1000000000000000000000000 -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert
    save_hash: token_decl_hash
  - wait_for_datum: "{{token_decl_hash}}"
    chain: zerochain
  
  # Step 2: Emit to wallet1
  - cli: token_emit -token LIFECYCLE -emission_value 100000000000000000000 -addr {{wallet1_addr}} -certs test_cert
    save_hash: emission_tx
  
  # Wait for emission to propagate (emission datum on zerochain)
  - wait_for_datum: "{{emission_tx}}"
    chain: zerochain
  
  - wait: 5s
  # Step 3: Transfer from wallet1 to wallet2
  - cli: tx_create -token LIFECYCLE -chain main -from_emission {{emission_tx}} -chain_emission zerochain -to_addr {{wallet2_addr}} -value 50000000000000000000 -fee 1000000000000000000 -cert test_cert
    save_hash: transfer_tx

check:
  # Verify token exists
  - cli: token info -name LIFECYCLE
    contains: "LIFECYCLE"
  
  # Verify transfer tx was placed in mempool
  - cli: mempool list -chain main
    contains: "{{transfer_tx}}"

