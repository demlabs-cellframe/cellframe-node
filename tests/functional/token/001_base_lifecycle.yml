# Test: Full Token Lifecycle
# Complete token lifecycle from creation to emission and UTXO

name: Full Token Lifecycle Test
description: Test complete token lifecycle - create, emit, convert to UTXO
tags: [e2e, integration, token, critical]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/set_root_cert.yml
  - common/version_compat.yml

defaults:
  node: node1

setup:
  - wait: 1s
  
  # Create wallet for receiving tokens
  - cli: wallet new -w lifecycle_wallet1
  
  # Get address with built-in validation
  - cli: wallet info -w lifecycle_wallet1 -net {{network_name}}
    wait: 1s
    save_wallet: wallet1_addr

test:
  - wait: 3s
  
  # Step 1: Create token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -net {{network_name}} -token LIFECYCLE -total_supply 1000000 -decimals 18 -signs_total 2 -signs_emission 2 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  # Process token datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
    description: "Process token datum through mempool"
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s
  
  # Step 2: Emit to wallet1 on zerochain - needs ROOT certs
  - cli: token_emit -net {{network_name}} -token LIFECYCLE -emission_value 10000 -addr {{wallet1_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emission_tx
  
  # Process emission datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{emission_tx}}
    description: "Process emission datum through mempool"
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s
  
  # Step 3: Convert emission to UTXO (must do this before from_wallet works)
  - cli: "{{tx_create_cmd}} -net {{network_name}} -chain_emission zerochain -token LIFECYCLE -from_emission {{emission_tx}} -to_addr {{wallet1_addr}} -value 10000 -cert {{root_cert_single}} -chain main"
    save_hash: base_tx_hash
  
  # Process base transaction
  - cli: mempool proc -net {{network_name}} -chain main -datum {{base_tx_hash}}
  
  # Wait for UTXO to appear in wallet
  - wait: 30s

check:
  # Verify token exists
  - cli: token info -net {{network_name}} -name LIFECYCLE
    contains: "LIFECYCLE"
    description: "Token LIFECYCLE should exist"
  
  # Verify wallet1 has tokens
  - cli: wallet info -w lifecycle_wallet1 -net {{network_name}}
    contains: "LIFECYCLE"
    description: "Verify wallet1 has LIFECYCLE tokens"
