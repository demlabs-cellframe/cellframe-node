name: Token Flags Test
description: Create token with ALL_FROZEN flag and verify flag is visible in token info
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml

test:
  - group: Create token with ALL_FROZEN flag
    steps:
      - cli: "token_decl -decimals 18 -signs_total 1 -signs_emission 1 -token FROZEN -total_supply 1000000 -flags ALL_FROZEN -certs test_cert"
        expect: success
        save_hash: frozen_hash

      - wait_for_datum: "{{frozen_hash}}"
        chain: zerochain
        timeout_total: 120
        timeout_mempool: 60
        timeout_in_blocks: 120

      - cli: "token info -net {{network_name}} -name FROZEN"
        expect: success
        contains: "FROZEN"

      - cli: "token info -net {{network_name}} -name FROZEN"
        expect: success
        contains: "flags"
