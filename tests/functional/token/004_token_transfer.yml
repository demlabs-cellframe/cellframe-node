# Test: Token Transfer
# Verify token transfers between wallets

name: Token Transfer Test
description: Test transferring tokens between two wallets
tags: [e2e, token, transfer]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/set_root_cert.yml

# Global defaults
defaults:
  node: node1
  wait: 1s

setup:
  - wait: 3s
  
  # Create wallets
  - cli: wallet new -w wallet1
  
  - cli: wallet new -w wallet2
  
  # Get wallet addresses with validation
  - cli: wallet info -w wallet1 -net {{network_name}}
    save_wallet: wallet1_addr
  
  - cli: wallet info -w wallet2 -net {{network_name}}
    save_wallet: wallet2_addr
  
  # Create token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -decimals 18 -signs_total 2 -signs_emission 2 -token XFERTEST -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  # Process token datum (auto_confirmation may not work in test env)
  - cli: mempool proc -chain zerochain -datum {{token_hash}}
  
  # Wait for ledger to sync token declaration
  - wait: 10s
  
  # Emit tokens to wallet1 on zerochain - needs ROOT certs
  - cli: token_emit -token XFERTEST -emission_value 10000 -addr {{wallet1_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emit_tx
  
  # Process emission datum
  - cli: mempool proc -chain zerochain -datum {{emit_tx}}
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s
  
  # Convert emission to UTXO (must do this before from_wallet works)
  - cli: tx_create -token XFERTEST -from_emission {{emit_tx}} -to_addr {{wallet1_addr}} -value 10000 -cert {{root_cert_single}} -chain main
    save_hash: base_tx_hash
  
  # Process base transaction
  - cli: mempool proc -chain main -datum {{base_tx_hash}}
  
  # Wait for UTXO to appear in wallet
  - wait: 10s

test:
  # Test: Transfer tokens to wallet2 using -from_wallet
  - cli: tx_create -token XFERTEST -from_wallet wallet1 -to_addr {{wallet2_addr}} -value 1000 -fee 0.1
    save_hash: transfer_tx
  
  # Process transaction datum on main chain
  - cli: mempool proc -chain main -datum {{transfer_tx}}

check:
  # Verify transaction in history
  # Note: -net is explicitly added because check phase may not inherit CLI defaults
  - cli: tx_history -tx {{transfer_tx}} -net {{network_name}}
    contains: "{{transfer_tx}}"

