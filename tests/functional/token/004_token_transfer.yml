# Test: Token Transfer
# Verify token transfers between wallets

name: Token Transfer Test
description: Test transferring tokens between two wallets
tags: [e2e, token, transfer]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml

# Global defaults
defaults:
  node: node1
  wait: 1s

setup:
  # Create wallets
  - cli: wallet new -w wallet1
  
  - cli: wallet new -w wallet2
  
  # Get wallet addresses with validation
  - cli: wallet info -w wallet1
    save_wallet: wallet1_addr
  
  - cli: wallet info -w wallet2
    save_wallet: wallet2_addr
  
  # Create token and wait for it to be accepted
  - cli: token_decl -decimals 18 -signs_total 1 -signs_emission 1 -token XFERTEST -total_supply 1000000000000000000000000 -certs test_cert
    save_hash: token_decl_hash
  - wait_for_datum: "{{token_decl_hash}}"
    chain: zerochain
  
  # Emit tokens to wallet1
  - cli: token_emit -token XFERTEST -emission_value 100000000000000000000 -addr {{wallet1_addr}} -certs test_cert
    save_hash: emit_tx
  
  - wait_for_datum: "{{emit_tx}}"
    chain: zerochain

  - wait: 5s
test:
  # Test: Transfer tokens to wallet2
  - cli: tx_create -token XFERTEST -chain main -from_emission {{emit_tx}} -chain_emission zerochain -to_addr {{wallet2_addr}} -value 10000000000000000000 -fee 1000000000000000000 -cert test_cert
    save_hash: transfer_tx

check:
  # Verify transfer tx was placed in mempool
  - cli: mempool list -chain main
    contains: "{{transfer_tx}}"

