# Test: Token Transfer
# Verify token emission to wallet and UTXO creation
# Note: Direct wallet-to-wallet transfer requires TCELL for fees which isn't available in test env

name: Token Transfer Test
description: Test token emission and UTXO creation (basic transfer flow)
tags: [e2e, token, transfer]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/set_root_cert.yml

defaults:
  node: node1
  wait: 1s

setup:
  - wait: 3s
  
  # Create wallet to receive tokens
  - cli: wallet new -w transfer_test_wallet
  
  # Get wallet address
  - cli: wallet info -w transfer_test_wallet -net {{network_name}}
    save_wallet: wallet_addr

test:
  # Create token on zerochain (DAG-PoA)
  - cli: token_decl -net {{network_name}} -decimals 18 -signs_total 2 -signs_emission 2 -token XFERTEST -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
  
  - wait: 30s
  
  # Emit tokens to wallet
  - cli: token_emit -net {{network_name}} -token XFERTEST -emission_value 10000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emit_tx
  
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{emit_tx}}
  
  - wait: 30s
  
  # Convert emission to UTXO
  - cli: tx create -net {{network_name}} -chain_emission zerochain -token XFERTEST -from_emission {{emit_tx}} -to_addr {{wallet_addr}} -value 10000 -cert {{root_cert_single}} -chain main
    save_hash: utxo_tx
  
  - cli: mempool proc -net {{network_name}} -chain main -datum {{utxo_tx}}
  
  - wait: 30s

check:
  # Verify token exists
  - cli: token info -net {{network_name}} -name XFERTEST
    contains: "XFERTEST"
    description: "Token XFERTEST should exist"
  
  # Verify wallet has tokens
  - cli: wallet info -w transfer_test_wallet -net {{network_name}}
    contains: "XFERTEST"
    description: "Wallet should have XFERTEST tokens"
