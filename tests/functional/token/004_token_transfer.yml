# Test: Token Transfer
# Verify token emission and UTXO creation

name: Token Transfer Test
description: Test creating token, emitting, and converting to UTXO
tags: [e2e, token, transfer]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/set_root_cert.yml

defaults:
  node: node1
  wait: 1s

setup:
  - wait: 3s
  
  # Create wallets
  - cli: wallet new -w wallet1
  
  - cli: wallet new -w wallet2
  
  # Get wallet addresses with validation
  - cli: wallet info -w wallet1 -net {{network_name}}
    save_wallet: wallet1_addr
  
  - cli: wallet info -w wallet2 -net {{network_name}}
    save_wallet: wallet2_addr
  
  # Create token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -net {{network_name}} -decimals 18 -signs_total 2 -signs_emission 2 -token XFERTEST -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  # Process token datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s
  
  # Emit tokens to wallet1 on zerochain - needs ROOT certs
  - cli: token_emit -net {{network_name}} -token XFERTEST -emission_value 10000 -addr {{wallet1_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emit_tx
  
  # Process emission datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{emit_tx}}
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s
  
  # Convert emission to UTXO
  - cli: tx create -net {{network_name}} -chain_emission zerochain -token XFERTEST -from_emission {{emit_tx}} -to_addr {{wallet1_addr}} -value 10000 -cert {{root_cert_single}} -chain main
    save_hash: base_tx_hash
  
  # Process base transaction
  - cli: mempool proc -net {{network_name}} -chain main -datum {{base_tx_hash}}
  
  # Wait for UTXO to appear in wallet
  - wait: 30s

test:
  # Test: Verify wallet1 has the tokens
  - cli: wallet info -w wallet1 -net {{network_name}}
    contains: "XFERTEST"
    description: "Wallet1 should have XFERTEST tokens"

check:
  # Verify token exists
  - cli: token info -net {{network_name}} -name XFERTEST
    contains: "XFERTEST"
    description: "Token XFERTEST should exist"
  
  # Verify wallet1 has tokens
  - cli: wallet info -w wallet1 -net {{network_name}}
    contains: "XFERTEST"
    description: "Verify wallet1 has XFERTEST tokens"
