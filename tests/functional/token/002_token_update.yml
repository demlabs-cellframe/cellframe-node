# Test: Token Update Operations
# Test token_update command for modifying token properties

name: Token Update Test
description: Test token_update command for updating token configuration
tags: [functional, token, update]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

defaults:
  node: node1
  wait: 3s  

setup:
  # Create token on zerochain (DAG-PoA)
  - cli: token_decl -net {{network_name}} -decimals 18 -signs_total 2 -signs_emission 2 -token TOKENUPD -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  - cli: mempool proc_all -net {{network_name}} -chain zerochain
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s

test:
  # Verify token exists before update
  - cli: token info -net {{network_name}} -name TOKENUPD
    contains: "TOKENUPD"
    description: "Token should exist before update"
  
  # Test: Use token_update to modify token (add tx_receiver_blocked address)
  - cli: token_update -net {{network_name}} -token TOKENUPD -tx_receiver_blocked_add {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: update_hash
    description: "Create token update to block receiver address"
  
  - cli: mempool proc_all -net {{network_name}} -chain zerochain
    description: "Process token update datum"
  
  # Wait for update to be processed
  - wait: 30s

check:
  # Verify token still exists and was updated
  - cli: token info -net {{network_name}} -name TOKENUPD
    contains: "TOKENUPD"
    description: "Token TOKENUPD should exist after update"
