# Test: Token Update Operations
# Test various token update commands

name: Token Update Test
description: Test token update operations (non-UTXO related)
tags: [functional, token, update]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

defaults:
  node: node1
  wait: 3s  

setup:
  # Create token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -net {{network_name}} -decimals 18 -signs_total 2 -signs_emission 2 -token UPDTEST -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  # Process token datum (auto_confirmation may not work in test env)
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
  
  # Emit tokens on zerochain - needs ROOT certs
  - cli: token_emit -net {{network_name}} -token UPDTEST -emission_value 5000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emit_hash
  
  # Process emission datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{emit_hash}}

test:
  # Test: Get token info
  # Note: -net is explicitly added because CLI defaults may not be injected in test phase
  - cli: token info -name UPDTEST -net {{network_name}}
    save: token_info

check:
  # Verify token info
  - python: |
      info = ctx.get_variable('token_info')
      assert 'UPDTEST' in info, "Token info should contain token name"

