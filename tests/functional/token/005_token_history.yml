# Test: Token History
# Test token transaction history

name: Token History Test
description: Test retrieving token transaction history
tags: [e2e, token, history]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_net_default.yml
  - common/set_root_cert.yml

defaults:
    wait: 3s
    node: node1

setup:
  # Note: test_wallet and wallet_addr come from common/wallets/create_wallet.yml include
  # Note: root_certs from common/set_root_cert.yml (both ROOT certs for auth_certs_number_verify=2)
  
  # Create second wallet for receiving
  - cli: wallet new -w hist_receiver
  - cli: wallet info -w hist_receiver -net {{network_name}}
    save_wallet: receiver_addr
  
  # Create token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -token HISTTEST -total_supply 1000000 -decimals 18 -signs_total 2 -signs_emission 2 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  # Process token datum (auto_confirmation may not work in test env)
  - cli: mempool proc -chain zerochain -datum {{token_hash}}
  
  # Wait for ledger to sync token declaration
  - wait: 10s
  
  # Emit token on zerochain - needs ROOT certs
  - cli: token_emit -token HISTTEST -emission_value 5000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emit_tx
  
  # Process emission datum
  - cli: mempool proc -chain zerochain -datum {{emit_tx}}
  
  # Wait for ledger to sync emission
  - wait: 5s
  
  # Create a transaction to receiver wallet
  - cli: tx_create -token HISTTEST -from_wallet {{wallet_name}} -to_addr {{receiver_addr}} -value 1000 -fee 0.1
    save_hash: tx_hash
  
  # Process transaction datum on main chain
  - cli: mempool proc -chain main -datum {{tx_hash}}

test:
  # Test: Get token history
  # Note: -net is explicitly added because test/check phase may not inherit CLI defaults
  - cli: token info -name HISTTEST -history_limit 10 -net {{network_name}}
    save: token_history

check:
  # Verify history contains transactions
  - python: |
      history = ctx.get_variable('token_history')
      assert history, "Token history should not be empty"
      assert 'HISTTEST' in history, "History should contain token name"

