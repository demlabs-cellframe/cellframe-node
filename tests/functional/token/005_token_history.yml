# Test: Token History
# Test token creation and info retrieval

name: Token History Test
description: Test creating token and retrieving token info
tags: [e2e, token, history]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

defaults:
  wait: 3s
  node: node1

setup:
  # Create token on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -net {{network_name}} -token HISTTEST -total_supply 1000000 -decimals 18 -signs_total 2 -signs_emission 2 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
  
  # Process token datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
  
  # Wait for DAG consensus and ledger sync
  - wait: 30s
  
  # Emit token on zerochain - needs ROOT certs
  - cli: token_emit -net {{network_name}} -token HISTTEST -emission_value 5000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emit_tx
  
  # Process emission datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{emit_tx}}
  
  # Wait for DAG consensus
  - wait: 30s

test:
  # Test: Get token info
  - cli: token info -net {{network_name}} -name HISTTEST
    expect: success
    contains: "HISTTEST"
    save: token_info_output
    description: "Token info should show HISTTEST token"

check:
  # Verify token exists by checking info
  - cli: token info -net {{network_name}} -name HISTTEST
    contains: "HISTTEST"
    description: "Token info should contain HISTTEST"
