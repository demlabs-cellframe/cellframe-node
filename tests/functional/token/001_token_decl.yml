name: Token declaration
description: Declare a new token, wait for block, verify in ledger with supply_total
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml

test:
  - group: Declare simple token
    steps:
      - cli: "token_decl -token FTEST01 -total_supply 1000000 -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert"
        expect: success
        save_hash: token_decl_hash

      - wait_for_datum: "{{token_decl_hash}}"
        chain: zerochain
        timeout_total: 120
        timeout_mempool: 60
        timeout_in_blocks: 120

  - group: Verify token exists in ledger
    steps:
      - cli: "token list"
        expect: success
        contains: "FTEST01"

      - cli: "token info -net {{network_name}} -name FTEST01"
        expect: success
        contains: "supply_total"

      - cli: "token info -net {{network_name}} -name FTEST01"
        expect: success
        contains: "FTEST01"
