# Test: Token Declaration
# Verify token creation

name: Token Declaration Test
description: Test creating new tokens with various parameters
tags: [e2e, token, declaration]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/set_root_cert.yml

setup:
  - wait: 3s

test:
  # Test: Create simple token (on zerochain - DAG-PoA)
  # Note: root_certs from common/set_root_cert.yml (both ROOT certs for auth_certs_number_verify=2)
  - cli: token_decl -decimals 18 -signs_total 2 -signs_emission 2 -token E2ETEST -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    node: node1
    expect: success
    save_hash: token_hash
    description: "Declare E2ETEST token"
  
  # Process datum manually (auto_confirmation may not work in test env)
  - cli: mempool proc -chain zerochain -datum {{token_hash}}
    node: node1
    expect: success
    description: "Process token datum through mempool"

check:
  # Verify token info is accessible
  # Note: -net is explicitly added because check phase may not inherit CLI defaults
  - cli: token info -name E2ETEST -net {{network_name}}
    node: node1
    expect: success
    contains: "E2ETEST"
    description: "Token info contains token name"

