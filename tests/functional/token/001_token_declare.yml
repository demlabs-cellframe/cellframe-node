name: Token declaration
description: Declare a new token and verify it appears in the token list
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml

test:
  - group: Declare simple token
    steps:
      - cli: "token_decl -token FTEST01 -total_supply 1000000 -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert"
        expect: success
        save_hash: token_decl_hash
        wait: 5s

      - wait_for_datum: "{{token_decl_hash}}"
        chain: zerochain
        timeout: 60

  - group: Verify token exists
    steps:
      - cli: "token list"
        expect: success
        contains: "FTEST01"

      - cli: "token info -net {{network_name}} -name FTEST01"
        expect: success
        contains: "Supply total"
