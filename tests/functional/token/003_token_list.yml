name: Token List Test
description: Create tokens and verify they all appear in token list
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml

test:
  - group: Verify native token exists
    steps:
      - cli: "token list"
        expect: success
        contains: "TCELL"

  - group: Create two tokens and wait for acceptance
    steps:
      - cli: "token_decl -token LIST1 -total_supply 1000000 -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert"
        expect: success
        save_hash: list1_hash

      - wait_for_datum: "{{list1_hash}}"
        chain: zerochain
        timeout_total: 120
        timeout_mempool: 60
        timeout_in_blocks: 120

      - cli: "token_decl -token LIST2 -total_supply 2000000 -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert"
        expect: success
        save_hash: list2_hash

      - wait_for_datum: "{{list2_hash}}"
        chain: zerochain
        timeout_total: 120
        timeout_mempool: 60
        timeout_in_blocks: 120

  - group: Verify both tokens in list
    steps:
      - cli: "token list"
        expect: success
        contains: "LIST1"

      - cli: "token list"
        expect: success
        contains: "LIST2"

      - cli: "token list"
        expect: success
        contains: "TCELL"
