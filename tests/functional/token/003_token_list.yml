# Test: Token Listing
# Verify token enumeration

name: Token List Test
description: Test listing available tokens
tags: [e2e, token, list, fast]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/set_root_cert.yml

setup:
  # Create test tokens on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -token LIST1 -total_supply 1000000 -decimals 18 -signs_total 2 -signs_emission 2 -certs {{root_certs}} -chain zerochain
    save_hash: list1_hash
  
  # Process token datum (auto_confirmation may not work in test env)
  - cli: mempool proc -chain zerochain -datum {{list1_hash}}
  
  - cli: token_decl -token LIST2 -total_supply 2000000 -decimals 18 -signs_total 2 -signs_emission 2 -certs {{root_certs}} -chain zerochain
    save_hash: list2_hash
  
  # Process token datum
  - cli: mempool proc -chain zerochain -datum {{list2_hash}}

test:
  # Test: Verify tokens exist via token info
  # Note: 'token list' returns only count, use 'token info -name X' to check existence
  - cli: token info -name LIST1 -net {{network_name}}
    save: list1_info
  
  - cli: token info -name LIST2 -net {{network_name}}
    save: list2_info

check:
  # Verify our tokens were created
  - python: |
      list1_info = ctx.get_variable('list1_info')
      list2_info = ctx.get_variable('list2_info')
      assert 'LIST1' in list1_info, "LIST1 token should exist"
      assert 'LIST2' in list2_info, "LIST2 token should exist"
    description: "Created tokens exist and accessible"

