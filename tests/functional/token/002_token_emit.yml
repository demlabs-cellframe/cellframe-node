name: Token emission
description: Emit tokens to a wallet and verify balance
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml
  - common/create_wallet.yml

test:
  - group: Declare token for emission test
    steps:
      - cli: "token_decl -token FTEMIT01 -total_supply 1000000 -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert"
        expect: success
        save_hash: token_decl_hash

      - wait_for_datum: "{{token_decl_hash}}"
        chain: zerochain
        timeout: 60

  - group: Emit tokens
    steps:
      - cli: "token_emit -token FTEMIT01 -emission_value 5000 -addr {{wallet_addr}} -certs test_cert"
        expect: success
        save_hash: emit_hash

      - wait_for_datum: "{{emit_hash}}"
        chain: zerochain
        timeout: 60

  - group: Verify balance
    steps:
      - wait: 5s

      - cli: "wallet info -w test_wallet -net {{network_name}}"
        expect: success
        contains: "FTEMIT01"
