name: Token emission
description: Emit tokens to a wallet and verify emission in mempool
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml
  - common/create_wallet.yml

test:
  - group: Declare token for emission test
    steps:
      - cli: "token_decl -token FTEMIT01 -total_supply 1000000 -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert"
        expect: success
        save_hash: token_decl_hash

      - wait_for_datum: "{{token_decl_hash}}"
        chain: zerochain

  - group: Emit tokens and credit wallet
    steps:
      - cli: "token_emit -token FTEMIT01 -emission_value 5000 -addr {{wallet_addr}} -certs test_cert"
        expect: success
        save_hash: emit_hash

      - wait_for_datum: "{{emit_hash}}"
        chain: zerochain

      - wait: 5s

      - cli: "tx_create -token FTEMIT01 -from_emission {{emit_hash}} -chain_emission zerochain -value 4999 -cert test_cert"
        expect: success
        save_hash: credit_tx_hash

  - group: Verify tx in mempool
    steps:
      - cli: "mempool list -chain main"
        expect: success
        contains: "{{credit_tx_hash}}"
