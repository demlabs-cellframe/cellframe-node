name: Token emission
description: Emit tokens to a wallet and verify balance
version: "1.0"

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

setup:
  # Create token on zerochain (DAG-PoA) - needs ROOT certs
  # Note: root_certs from common/set_root_cert.yml (both ROOT certs for auth_certs_number_verify=2)
  - cli: token_decl -net {{network_name}} -decimals 18 -signs_total 2 -signs_emission 2 -token EMITTEST -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash
    description: "Declare EMITTEST token"
  
  # Process token datum (auto_confirmation may not work in test env)
  - cli: mempool proc_all -net {{network_name}} -chain zerochain
    description: "Process token datum through mempool"

test:
  # Emit tokens on zerochain - needs ROOT certs
  - cli: token_emit -net {{network_name}} -token EMITTEST -emission_value 10000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emit_tx
    description: "Emit tokens to wallet"
  
  # Process emission datum
  - cli: mempool proc_all -net {{network_name}} -chain zerochain
    description: "Process emission datum through mempool"

check:
  # Verify emission (inherits node from global defaults)
  # Note: -net is explicitly added because check phase may not inherit CLI defaults
  - cli: token info -name EMITTEST -history_limit 10 -net {{network_name}}
    contains: "EMITTEST"
    description: "Token history contains emission"
