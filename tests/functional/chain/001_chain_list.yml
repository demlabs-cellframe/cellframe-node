name: Chain List Test
description: Verify chain enumeration returns both chains
version: "1.0"

includes:
  - common/defaults.yml

test:
  - group: List chains shows both chains
    steps:
      - cli: "net list chains"
        expect: success
        contains: "zerochain"

      - cli: "net list chains"
        expect: success
        contains: "main"
