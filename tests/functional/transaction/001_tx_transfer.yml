name: Basic token transfer
description: Transfer tokens between two wallets
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml

test:
  - group: Setup wallets and fund sender
    steps:
      - cli: "wallet new -w sender_wallet -sign_type sig_dil"
        expect: success
        save_wallet: sender_addr

      - cli: "wallet new -w receiver_wallet -sign_type sig_dil"
        expect: success
        save_wallet: receiver_addr

      - cli: "token_decl -token FTTX01 -total_supply 1000000 -decimals 18 -signs_total 1 -signs_emission 1 -certs test_cert"
        expect: success
        save_hash: token_hash

      - wait_for_datum: "{{token_hash}}"
        chain: zerochain
        timeout_total: 420
        timeout_mempool: 360
        timeout_verification: 360
        timeout_in_blocks: 360

      - cli: "token_emit -token FTTX01 -emission_value 10000 -addr {{sender_addr}} -certs test_cert"
        expect: success
        save_hash: emit_hash

      - wait_for_datum: "{{emit_hash}}"
        chain: zerochain
        timeout_total: 420
        timeout_mempool: 360
        timeout_verification: 360
        timeout_in_blocks: 360

  - group: Transfer tokens
    steps:
      - wait: 5s

      - cli: "tx_create -net {{network_name}} -chain main -token FTTX01 -value 1000 -from_wallet sender_wallet -addr {{receiver_addr}}"
        expect: success
        save_hash: tx_hash

      - wait_for_datum: "{{tx_hash}}"
        chain: main
        timeout_total: 420
        timeout_mempool: 360
        timeout_verification: 360
        timeout_in_blocks: 360

  - group: Verify balances
    steps:
      - wait: 5s

      - cli: "wallet info -w receiver_wallet -net {{network_name}}"
        expect: success
        contains: "FTTX01"
