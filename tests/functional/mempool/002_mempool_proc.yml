name: Mempool Processing Test
description: Declare token, emit, create TX, verify TX appears in mempool
version: "1.0"

includes:
  - common/defaults.yml
  - common/create_test_cert.yml
  - common/create_wallet.yml

test:
  - group: Declare token and wait for ledger acceptance
    steps:
      - cli: "token_decl -decimals 18 -signs_total 1 -signs_emission 1 -token MEMPOOLTEST -total_supply 1000000 -certs test_cert"
        expect: success
        save_hash: token_decl_hash

      - wait_for_datum: "{{token_decl_hash}}"
        chain: zerochain
        timeout_total: 120
        timeout_mempool: 60
        timeout_in_blocks: 120

  - group: Emit tokens and wait for ledger acceptance
    steps:
      - cli: "token_emit -token MEMPOOLTEST -emission_value 10000 -addr {{wallet_addr}} -certs test_cert"
        expect: success
        save_hash: emit_hash

      - wait_for_datum: "{{emit_hash}}"
        chain: zerochain
        timeout_total: 120
        timeout_mempool: 60
        timeout_in_blocks: 120

      - wait: 5s

  - group: Create transaction and verify in mempool
    steps:
      - cli: "tx_create -token MEMPOOLTEST -chain main -from_emission {{emit_hash}} -chain_emission zerochain -to_addr {{wallet_addr}} -value 500 -fee 1 -cert test_cert"
        expect: success
        save_hash: tx_hash

      - cli: "mempool list -chain main"
        expect: success
        contains: "{{tx_hash}}"
