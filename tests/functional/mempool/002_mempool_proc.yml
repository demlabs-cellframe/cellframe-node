# Test: Mempool Processing
# Test mempool proc command functionality

name: Mempool Processing Test
description: Test mempool proc command processes datums correctly
tags: [functional, mempool, processing]
version: "1.0"

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

defaults:
  node: node1
  wait: 3s

setup:
  # Create token datum (will go to mempool first)
  - cli: token_decl -net {{network_name}} -decimals 18 -signs_total 2 -signs_emission 2 -token MEMTEST -total_supply 1000000 -certs {{root_certs}} -chain zerochain
    save_hash: token_hash

test:
  # Test: Process token datum through mempool
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{token_hash}}
    description: "Process token datum through mempool"
  
  - wait: 30s
  
  # Emit token - creates another datum in mempool
  - cli: token_emit -net {{network_name}} -token MEMTEST -emission_value 10000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: emit_hash
  
  # Process emission datum
  - cli: mempool proc -net {{network_name}} -chain zerochain -datum {{emit_hash}}
    description: "Process emission datum through mempool"
  
  - wait: 30s

check:
  # Verify datums were processed - token should exist
  - cli: token info -net {{network_name}} -name MEMTEST
    contains: "MEMTEST"
    description: "Token MEMTEST should exist after mempool processing"
