name: Mempool List Test
description: Verify mempool list returns structured output for both chains
version: "1.0"

includes:
  - common/defaults.yml

test:
  - group: List mempool on zerochain
    steps:
      - cli: "mempool list -chain zerochain"
        expect: success
        contains: "{{network_name}}"

  - group: List mempool on main chain
    steps:
      - cli: "mempool list -chain main"
        expect: success
        contains: "{{network_name}}"
