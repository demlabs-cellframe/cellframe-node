name: Wallet Info Detailed Test
description: Verify wallet info returns address and wallet appears in list
version: "1.0"

includes:
  - common/defaults.yml

test:
  - group: Create and verify wallet info
    steps:
      - cli: "wallet new -w info_test_wallet -sign_type sig_dil"
        expect: success

      - wait: 2s

      - cli: "wallet info -w info_test_wallet -net {{network_name}}"
        expect: success
        contains: "addr"
        save_wallet: wallet_addr

  - group: Verify wallet appears in list
    steps:
      - cli: "wallet list"
        expect: success
        contains: "info_test_wallet"

  - group: Verify address is returned on repeated query
    steps:
      - cli: "wallet info -w info_test_wallet -net {{network_name}}"
        expect: success
        contains: "{{wallet_addr}}"
