# Test wallet balance checking
name: Wallet Balance Test
description: Test checking wallet balance after token emission
tags: [functional, wallet, balance]

network:
  topology: default

includes:
  - common/networks/single_node.yml
  - common/wallets/create_wallet.yml
  - common/set_root_cert.yml

defaults:
  node: node1

setup:
  # Create token declaration on zerochain (DAG-PoA) - needs ROOT certs
  - cli: token_decl -token BALTEST -total_supply 1000000 -decimals 18 -signs_total 2 -signs_emission 2 -certs {{root_certs}} -chain zerochain
    save_hash: token_decl_hash
  
  # Process token datum (auto_confirmation may not work in test env)
  - cli: mempool proc -chain zerochain -datum {{token_decl_hash}}

  # Do the emission on zerochain - needs ROOT certs
  - cli: token_emit -token BALTEST -emission_value 5000 -addr {{wallet_addr}} -certs {{root_certs}} -chain zerochain
    save_hash: token_emit_hash
  
  # Process emission datum
  - cli: mempool proc -chain zerochain -datum {{token_emit_hash}}

test:
  # Test: Check wallet balance
  - cli: wallet info -w test_wallet -net {{network_name}}
    save: balance_info
    description: "Check wallet balance"

check:
  # Verify balance info is returned
  - python: |
      balance = ctx.get_variable('balance_info')
      assert balance, "Balance info should not be empty"
    description: "Balance info is accessible"

