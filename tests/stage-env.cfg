[network]
name = stagenet
network_id = 0x1234
consensus_type = esbocs

[topology]
root_nodes_count = 2
master_nodes_count = 2
full_nodes_count = 1

[build]
build_type = debug
genesis_version = v6.0

[network_settings]
base_rpc_port = 8545
base_p2p_port = 31337
base_cf_port = 7007
base_http_port = 8079
node_port = 8079
base_ip = 172.20.0.10
subnet = 172.20.0.0/16

[consensus]
min_validators = 1
new_round_delay = 15
collecting_level = 10.0
auth_certs_prefix = stagenet.master

[features]
monitoring = false
tests = false
crash_artifacts = true

[logging]
log_dir = ../../build/stage-env/logs
log_level = debug
scenario_logs = true
retain_days = 7

[paths]
cache_dir = ../../build/stage-env/cache
artifacts_dir = ../../build/stage-env/artifacts

[artifacts]
collect_node_logs = true
collect_health_logs = true
collect_crash_dumps = true
retain_days = 7

[timeouts]
startup = 300
health_check = 300
command = 30

[scenarios]
debug = false

[node_source]
type = local
local_path = /home/demlabs/projects/cellframe-node/build/cellframe-node-6.0-LOCALBUILD1-dbg-arm64.deb

[suite_isolation]
mode = filesystem

[plugins]
enabled = true
enabled_roles = root,master,full

